<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenMarket</title>
    <meta
      name="description"
      content="OpenMarket is a multi-vendor marketplace demo with approvals, moderation, seasonal product lifecycle, and role-based dashboards."
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="backdrop backdrop-one"></div>
    <div class="backdrop backdrop-two"></div>

    <div class="site-shell">
      <header class="topbar">
        <a href="/" class="brand" data-link>
          <div class="brand-mark">OM</div>
          <div>
            <div class="eyebrow">Multi-vendor marketplace</div>
            <div class="brand-title">OpenMarket</div>
          </div>
        </a>

        <nav id="site-nav" class="site-nav" aria-label="Primary"></nav>
        <div id="site-actions" class="site-actions"></div>
      </header>

      <div id="banner" class="banner" hidden></div>
      <main id="app" class="app-stage"></main>

      <footer class="site-footer">
        <div>
          <strong>OpenMarket</strong>
          <span>English-only marketplace workflow demo with seeded data.</span>
        </div>
        <div class="footer-note">Customer, vendor, moderator, admin, and super admin flows are available locally.</div>
      </footer>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
